services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8033:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ASSESSMENT_API_URL: ${NEXT_PUBLIC_ASSESSMENT_API_URL:-http://localhost:8033}
    environment:
      NEXT_PUBLIC_ASSESSMENT_API_URL: ${NEXT_PUBLIC_ASSESSMENT_API_URL:-http://localhost:8033}
    depends_on:
      - backend
    ports:
      - "3033:3000"
