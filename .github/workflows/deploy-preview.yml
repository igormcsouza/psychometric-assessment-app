name: Deploy preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Deploy backend to Lambda
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --no-dev

      - name: Package backend
        working-directory: backend
        run: |
          rm -rf package backend-lambda.zip
          mkdir -p package
          cp -R .venv/lib/python3.11/site-packages/. package/
          cp -R app package/
          cd package
          zip -r ../backend-lambda.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://backend/backend-lambda.zip

      - name: Wait for Lambda update to finish
        run: |
          for attempt in $(seq 1 30); do
            status=$(aws lambda get-function-configuration \
              --function-name "${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}" \
              --query LastUpdateStatus \
              --output text)

            if [ "$status" = "Successful" ]; then
              exit 0
            fi

            if [ "$status" = "Failed" ]; then
              echo "Lambda update failed before env vars could be applied."
              exit 1
            fi

            echo "Lambda update still in progress (attempt $attempt/30). Waiting..."
            sleep 5
          done

          echo "Timed out waiting for Lambda update to finish."
          exit 1

      - name: Update Lambda env vars
        run: |
          python - <<'PY'
          import json
          import os

          payload = {
              "Variables": {
                  "DEBUG": "0",
                  "OPENAI_API_KEY": os.environ["OPENAI_API_KEY"],
                  "OPENAI_MODEL": os.environ["OPENAI_MODEL"],
                  "OPENAI_TIMEOUT_SECONDS": os.environ["OPENAI_TIMEOUT_SECONDS"],
              }
          }

          with open("backend/lambda-env.json", "w", encoding="utf-8") as file:
              json.dump(payload, file)
          PY

          aws lambda update-function-configuration \
            --function-name "${{ secrets.AWS_LAMBDA_FUNCTION_NAME }}" \
            --environment file://backend/lambda-env.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_TIMEOUT_SECONDS: ${{ secrets.OPENAI_TIMEOUT_SECONDS }}
